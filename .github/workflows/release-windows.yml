# Compila el .exe en Windows y lo sube a GitHub Releases.
# No necesitas GH_TOKEN en tu máquina.
#
# Forma habitual (sin entrar a Actions):
#   git tag v1.0.1
#   git push origin v1.0.1
# El workflow toma la versión del tag (v1.0.1 → 1.0.1 en package.json solo en CI).
#
# Opcional: Actions → Release Windows → Run workflow (útil para pruebas).
# Si usas solo el botón, sube "version" en package.json antes y haz push.
#
# Valores empaquetados en el .exe (GitHub → Settings → Secrets and variables → Actions):
#   Variables: TITANIOPOS_URL (si no existe, se usa http://localhost:3001 en el .env del build)
#   Secrets: TITANIOPOS_JWT_SECRET

name: Release Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Align package.json version with git tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VER="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const f = 'package.json';
            const j = JSON.parse(fs.readFileSync(f, 'utf8'));
            j.version = process.argv[1];
            fs.writeFileSync(f, JSON.stringify(j, null, 2) + '\n');
          " "$TAG_VER"

      - name: Create .env from GitHub Variables and Secrets
        shell: pwsh
        env:
          TITANIOPOS_URL_INPUT: ${{ vars.TITANIOPOS_URL }}
          TITANIOPOS_JWT_SECRET: ${{ secrets.TITANIOPOS_JWT_SECRET }}
        run: |
          $url = $env:TITANIOPOS_URL_INPUT
          if ([string]::IsNullOrWhiteSpace($url)) {
            $url = 'http://localhost:3001'
          }
          $jwt = if ($null -eq $env:TITANIOPOS_JWT_SECRET) { '' } else { $env:TITANIOPOS_JWT_SECRET }
          $content = "TITANIOPOS_URL=$url`nTITANIOPOS_JWT_SECRET=$jwt`n"
          Set-Content -Path .env -Encoding utf8 -Value $content

      - name: Build and publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release
